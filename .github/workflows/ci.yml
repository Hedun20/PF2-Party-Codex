name: CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Use Node.js 24 LTS
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Run route, access, and server tests
        run: npm test
        env:
          AUTH_SECRET: ci-only-signing-secret-with-at-least-32-characters

      - name: Build production web bundle and enforce budgets
        run: npm run build

      - name: Check server and script syntax
        run: npm run check:syntax

      - name: Audit production dependencies
        run: npm run audit:production
