name: CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Use Node.js 24 LTS
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Generate frontend architecture inventory
        run: node scripts/audit-frontend-architecture.mjs artifacts/ss-stage1

      - name: Upload frontend architecture inventory
        uses: actions/upload-artifact@v4
        with:
          name: ss-stage1-frontend-inventory
          path: artifacts/ss-stage1
          retention-days: 7

      - name: Run SS architecture contracts
        shell: bash
        run: set -o pipefail; node --test tests/ss-stage1-architecture-contracts.test.mjs tests/ss-stage2-routing-shell-contracts.test.mjs 2>&1 | tee ss-architecture.log

      - name: Upload SS architecture diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ss-architecture-log
          path: ss-architecture.log
          retention-days: 3

      - name: Run invitation and auth continuity contracts
        run: node --test tests/invitation-trust-flow-contracts.test.mjs tests/invitation-operations-contracts.test.mjs tests/auth-continuity-contracts.test.mjs
        env:
          AUTH_SECRET: ci-only-signing-secret-with-at-least-32-characters

      - name: Run route and access contracts
        shell: bash
        run: set -o pipefail; node --test tests/frontend-source-contracts.test.mjs tests/backend-route-boundary-contracts.test.mjs tests/security-storage-contracts.test.mjs tests/campaign-context-resilience-contracts.test.mjs tests/portal-home-contracts.test.mjs tests/route-state-polish-contracts.test.mjs 2>&1 | tee route-access.log
        env:
          AUTH_SECRET: ci-only-signing-secret-with-at-least-32-characters

      - name: Upload route and access diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: route-access-log
          path: route-access.log
          retention-days: 3

      - name: Run server smoke tests
        run: node --test tests/server-smoke.test.mjs 2>&1 | tee server-smoke.log
        env:
          AUTH_SECRET: ci-only-signing-secret-with-at-least-32-characters

      - name: Upload smoke diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-smoke-log
          path: server-smoke.log
          retention-days: 3

      - name: Run content, seed, dice, character editor and select contracts
        run: node --test tests/content-contracts.test.mjs tests/demo-seed-contracts.test.mjs tests/demo-targeting-contracts.test.mjs tests/dice-roll-contracts.test.mjs tests/character-editor-contracts.test.mjs tests/character-assignment-contracts.test.mjs tests/pf2-tactical-sheet-contracts.test.mjs tests/pf2-import-enrichment-contracts.test.mjs tests/select-archive-hotfix-contracts.test.mjs
        env:
          AUTH_SECRET: ci-only-signing-secret-with-at-least-32-characters

      - name: Build production web bundle and enforce budgets
        run: npm run build

      - name: Check server and script syntax
        run: npm run check:syntax

      - name: Audit production dependencies
        run: npm run audit:production
